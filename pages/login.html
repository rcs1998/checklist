<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Checklist de Veículos</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="page-login">
  <div class="login-card">
    <div class="card">
      <!-- Brand -->
      <div class="login-brand" style="padding:32px 24px 0">
        <div class="brand-icon-lg">🚗</div>
        <h1>Checklist de Veículos</h1>
        <p>Acesse o painel administrativo</p>
      </div>

      <div class="card-body">
        <form id="login-form" novalidate>
          <div id="login-erro" class="hidden" style="
            background:var(--cor-reprovado-dim);
            border:1px solid var(--cor-reprovado);
            color:var(--cor-reprovado);
            border-radius:var(--radius-sm);
            padding:10px 14px;
            font-size:13px;
            margin-bottom:16px;
          "></div>

          <div class="form-group">
            <label class="form-label" for="login-email">E-mail</label>
            <input
              type="email"
              id="login-email"
              class="form-control"
              placeholder="seu@email.com"
              autocomplete="email"
              required
            >
          </div>

          <div class="form-group">
            <label class="form-label" for="login-senha">Senha</label>
            <div style="position:relative">
              <input
                type="password"
                id="login-senha"
                class="form-control"
                placeholder="••••••••"
                autocomplete="current-password"
                required
                style="padding-right:44px"
              >
              <button
                type="button"
                id="toggle-senha"
                style="
                  position:absolute;right:12px;top:50%;transform:translateY(-50%);
                  background:none;border:none;cursor:pointer;font-size:16px;
                  color:var(--cor-texto-3);padding:0;
                "
              >👁️</button>
            </div>
          </div>

          <button type="submit" id="btn-login" class="btn btn-primary btn-lg" style="width:100%;margin-top:8px">
            Entrar
          </button>
        </form>

        <div style="margin-top:20px;text-align:center">
          <a href="../index.html" style="font-size:13px;color:var(--cor-texto-3)">
            ← Voltar para o Checklist
          </a>
        </div>

        <div style="
          margin-top:20px;
          padding:12px;
          background:var(--cor-fundo);
          border-radius:var(--radius-sm);
          font-size:12px;
          color:var(--cor-texto-3);
          text-align:center;
          border:1px solid var(--cor-borda)
        ">
          💡 Para criar o primeiro usuário administrador, use o<br>
          <strong>Firebase Authentication</strong> no console do Firebase.
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script type="module" src="../js/login.js"></script>
</body>
</html>
